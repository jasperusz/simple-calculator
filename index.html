<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div class="content">
        <div id="centercontainer">
            <div id="calculator">
                <button type="button" class="numberButtons">1</button>
                <button type="button" class="numberButtons">2</button>
                <button type="button" class="numberButtons">3</button>
                <button type="button" class="numberButtons">4</button>
                <button type="button" class="numberButtons">5</button>
                <button type="button" class="numberButtons">6</button>
                <button type="button" class="numberButtons">7</button>
                <button type="button" class="numberButtons">8</button>
                <button type="button" class="numberButtons">9</button>
                <button type="button" class="numberButtons">0</button>
                <button type="button" class="operatorButtons">+</button>
                <button type="button" class="operatorButtons">-</button>
                <button type="button" class="operatorButtons">/</button>
                <button type="button" class="operatorButtons">*</button>
                <button type="button" class="operatorButtons" id="resultButton">=</button>
            </div>
        </div>
    </div>
</body>
</html>
