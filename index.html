<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="content">
        <div id="centercontainer">
            <div id="calculator">
                <div id="console"><p id="consoleText">PRESS A NUMBER TO START</p></div>
                <div class="buttons">
                    <button type="button" class="numberButtons">1</button>
                    <button type="button" class="numberButtons">2</button>
                    <button type="button" class="numberButtons">3</button>
                    <button type="button" class="numberButtons">4</button>
                    <button type="button" class="numberButtons">5</button>
                    <button type="button" class="numberButtons">6</button>
                    <button type="button" class="numberButtons">7</button>
                    <button type="button" class="numberButtons">8</button>
                    <button type="button" class="numberButtons">9</button>
                    <button type="button" class="numberButtons">0</button>
                    <div class="operators">
                        <button type="button" class="operatorButtons">+</button>
                        <button type="button" class="operatorButtons">-</button>
                        <button type="button" class="operatorButtons">/</button>
                        <button type="button" class="operatorButtons">*</button>
                        <button type="button" class="operatorButtons" id="resultButton">=</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
